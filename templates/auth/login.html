{% extends "base.html" %}
{% block title %}Log in — Grind{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Log in and get back to work.</p>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="your password" required>
      </div>
      <div class="form-check">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Log in</button>
    </form>

    <p class="auth-switch">No account? <a href="{{ url_for('auth.register') }}">Create one</a></p>
  </div>
</div>
{% endblock %}

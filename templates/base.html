<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIND{% block title %}{% endblock %}</title>
<link rel="stylesheet" href="/static/css/main.css">
{% block head %}{% endblock %}
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-top">
      <a href="/" class="logo">
        <span class="logo-mark">G</span>
        <div>
          <div class="logo-text">RIND</div>
        </div>
      </a>
    </div>
    <div class="sidebar-nav">
      <a href="/dashboard" class="nav-item {% if request.path == '/dashboard' or request.path == '/' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="/grind" class="nav-item {% if request.path == '/grind' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <span>Grind</span>
      </a>
      <a href="/chat" class="nav-item {% if request.path == '/chat' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Chat</span>
      </a>
      <a href="/graph" class="nav-item {% if request.path == '/graph' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        <span>Graph</span>
      </a>
      <a href="/profile" class="nav-item {% if request.path == '/profile' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <a href="/api/export" class="nav-item small">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Export data</span>
      </a>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <svg id="theme-icon-dark" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="theme-icon-light" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <div class="streak-badge" id="sidebar-streak">
        <div>
          <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;opacity:0.6;margin-bottom:2px;">Streak</div>
          <span id="streak-count" style="font-size:14px;font-weight:700;">—</span>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="opacity:0.6;"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
    </div>
  </nav>
  <main class="main-content">
    <div id="milestone-toast" class="milestone-toast hidden"></div>
    {% block content %}{% endblock %}
  </main>
</div>
<script src="/static/js/app.js"></script>
<script>
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('grind-theme', next);
  document.getElementById('theme-icon-dark').style.display = isDark ? 'none' : 'block';
  document.getElementById('theme-icon-light').style.display = isDark ? 'block' : 'none';
}

(function() {
  const saved = localStorage.getItem('grind-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  if (saved === 'light') {
    const d = document.getElementById('theme-icon-dark');
    const l = document.getElementById('theme-icon-light');
    if (d) d.style.display = 'none';
    if (l) l.style.display = 'block';
  }
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
